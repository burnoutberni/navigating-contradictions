name: Update Events

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: update-events
  cancel-in-progress: true

jobs:
  update-events:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate events in index
        run: node scripts/update-events.mjs

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add index.html
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update events"
          git push origin HEAD:main
